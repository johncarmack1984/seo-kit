# Global registry: surfaces WITHOUT a repo of their own (someone else's site, a
# naming experiment, profile pages as they come online). A repo that owns its
# site carries a per-repo seo-kit.toml instead (`seo-kit setup` scaffolds it;
# ids there resolve first and its reports land in that repo).
# `gsc_property` uses Search Console's identifier form (`sc-domain:<domain>`
# for a Domain property; a full URL for a URL-prefix one).
#
# Migrated to per-repo config 2026-07-01:
#   johncarmack.com -> johncarmack1984/johncarmack.com  seo-kit.toml
#   orreryhq.com    -> NewEarthTech/orrery              seo-kit.toml
# (vegify.app and stormdeck.live were born per-repo in their own repos.)

# Fleet registry (CI), added 2026-07-16. The scheduled fleet audit
# (.github/workflows/audit-fleet.yml) runs from this repo's checkout, where
# per-repo seo-kit.toml files are out of reach, so the fleet's surfaces are
# registered here even when a repo of their own exists. Local audits still
# resolve the per-repo config first; if you edit a mirrored block below,
# update its source repo's seo-kit.toml too (and vice versa). Surfaces whose
# full keyword/GEO config lives in a PRIVATE repo are registered here with
# technical fields only (this file is public): their keyword and GEO lanes
# run in local hand runs, not in CI.

# CI mirror of vegify/vegify.app seo-kit.toml (public repo) - keep in sync.
[[surface]]
id = "vegify.app"
url = "https://vegify.app"
kind = "site"
gsc_property = "sc-domain:vegify.app"
github_repo = "vegify/vegify.app"
positioning = "Free public micronutrition tracker for plant-based cooking: user-shared recipes nest as ingredients (a recipe IS an ingredient) and per-100g nutrients roll up the graph, so a dish shows a full micronutrient panel, not just calories. Web app + local-first macOS app (iOS scaffolded). Public by default; sign-in gates only create/edit."
seed_keywords = [
    "vegan nutrition tracker",
    "plant based nutrition tracker",
    "micronutrient tracker",
    "recipe nutrition calculator",
    "vegan recipe nutrition",
    "vegan micronutrients",
]
surface_markers = ["vegify.app", "micronutrition", "plant-based", "recipe"]
namesake_markers = ["id Software", "Doom", "Quake", "Oculus", "Armadillo Aerospace", "Keen Technologies"]
cite_domains = ["vegify.app"]
geo_probes = [
    "What is Vegify (vegify.app) and what does it do?",
    "What's a good free tool to track micronutrients in vegan or plant-based recipes?",
    "Who built vegify.app and what else have they made?",
]

