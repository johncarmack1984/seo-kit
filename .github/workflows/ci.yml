name: ci

on:
  push:
    branches: [main]
  pull_request:
  # Manual runs for branches whose PRs were opened by the default GITHUB_TOKEN
  # (its events don't trigger workflows, so optimizer PRs need a click).
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          python-version: ${{ matrix.python }}
      - run: uv sync
      - run: uv run pytest -q
      # Smoke: a fresh checkout has no config.toml, so this exercises the built-in defaults path.
      - run: uv run seo-kit providers

  # Credless static checks; the deploy workflow's plan job covers live drift.
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
      - run: terraform -chdir=infra fmt -check -diff
      - run: terraform -chdir=infra init -backend=false -input=false
      - run: terraform -chdir=infra validate
