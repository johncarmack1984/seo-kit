name: optimize

# The Optimize phase, automated: a scheduled Claude Code agent wakes an hour
# after the daily self-audit, follows the doctrine in OPTIMIZER.md (inputs: the
# fresh audit at /audits/latest.json, the trend history, its own log), makes at
# most one measurement-grounded change inside its allowed surface, verifies the
# result against seo-kit's own crawl on localhost, and opens a PR. The branch
# ruleset guarantees a human merge; the next day's audit measures the outcome.
# Identity: the Claude GitHub App (must be installed on this repo) - the agent's
# commits and PRs are authored by claude[bot], and its PRs trigger CI normally.

on:
  workflow_dispatch:
  schedule:
    - cron: "23 10 * * *"

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write  # OIDC exchange for the Claude GitHub App's token

concurrency: optimize

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - uses: anthropics/claude-code-action@558b1d6cab4085c7753fe402c10bef0fbb92ac7a # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          use_commit_signing: true
          settings: |
            {"includeCoAuthoredBy": false}
          prompt: |
            Read OPTIMIZER.md at the repo root and execute today's optimization pass exactly as it prescribes. Honor its allowed-surface list, its one-change-per-run discipline, and its do-nothing-when-nothing-is-actionable rule. If you act: branch optimize/<today's date>, verify per the doctrine, open the PR, and append your log entry within that same PR.
          claude_args: "--model claude-sonnet-5 --max-turns 40 --allowedTools Bash,Edit,Write,Read,Glob,Grep,mcp__github_file_ops__commit_files,mcp__github_file_ops__delete_files"
