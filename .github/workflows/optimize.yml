name: optimize

# The Optimize phase, automated: a scheduled Claude Code agent wakes an hour
# after the daily self-audit, follows the doctrine in OPTIMIZER.md (inputs: the
# fresh audit at /audits/latest.json, the trend history, its own log), makes at
# most one measurement-grounded change inside its allowed surface, verifies the
# result against seo-kit's own crawl on localhost, and opens a PR. The branch
# ruleset guarantees a human merge; the next day's audit measures the outcome.
# Identity: the Claude GitHub App (must be installed on this repo) - the agent's
# commits and PRs are authored by claude[bot], and its PRs trigger CI normally.

on:
  workflow_dispatch:
  schedule:
    - cron: "23 10 * * *"

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write  # OIDC exchange for the Claude GitHub App's token

concurrency: optimize

jobs:
  optimize:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - uses: anthropics/claude-code-action@3553f84341b92da26052e28acf1aa898f9511f32 # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          use_commit_signing: true
          # The signing tool commits to the branch the action checks out; without
          # these it defaults to main (bounced by the ruleset - caught by the
          # agent's own re-propose note on its first signed PR).
          branch_prefix: "optimize/"
          base_branch: "main"
          settings: |
            {"includeCoAuthoredBy": false}
          prompt: |
            Read OPTIMIZER.md at the repo root and execute today's optimization pass exactly as it prescribes. Score matured experiments FIRST - a matured verdict alone requires a log-entry PR, even with no new optimization. Honor its allowed-surface list, its one-change-per-run discipline, and its do-nothing-when-nothing-matured-and-nothing-is-actionable rule. If you act: branch optimize/<today's date>, verify per the doctrine, open the PR, and append your log entry within that same PR.
          claude_args: "--model claude-sonnet-5 --max-turns 80 --allowedTools Bash,Edit,Write,Read,Glob,Grep,mcp__github_file_ops__commit_files,mcp__github_file_ops__delete_files"
      # A dead scheduled run must page, not vanish: the 2026-07-13 run exhausted
      # its turn budget, failed, and the loop sat stalled with nobody told.
      - name: Alert on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "optimize run failed $(date -u +%Y-%m-%d)" \
            --body "Scheduled optimizer run failed. Log: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
