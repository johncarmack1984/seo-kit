# seo-kit dogfooding itself: this repo is a registered surface — the same file
# `seo-kit setup` scaffolds, filled in for real. The project site is the surface
# URL; github_repo adds the repo-signal layer. Audit history: seo-reports/.
# gsc_property stays commented until the property is verified in Search Console.

[seokit]
reports_dir = "seo-reports"

[[surface]]
id = "seo-kit"
url = "https://seo-kit.johncarmack.com/"
kind = "site"
github_repo = "johncarmack1984/seo-kit"
gsc_property = "sc-domain:seo-kit.johncarmack.com"
positioning = "Real-data SEO + GEO audit CLI: free Tier-0 core, paid tiers opt-in, honest about limits; measures LLM citation and namesake disambiguation, not just rankings"
seed_keywords = [
    "generative engine optimization tool",
    "GEO audit tool",
    "LLM SEO audit",
    "AI search visibility audit",
]

# GEO probe: does an answer engine surface THIS seo-kit, or a namesake ("SEO kit"
# is a crowded name: WordPress plugins, a different PyPI seokit)?
surface_markers = ["johncarmack1984", "seo-kit.johncarmack.com"]
namesake_markers = ["wordpress", "rank math", "yoast", "woocommerce"]
cite_domains = ["seo-kit.johncarmack.com", "github.com/johncarmack1984/seo-kit"]
geo_probes = [
    "What open-source tools audit GEO (generative engine optimization) - whether LLM answer engines cite a site?",
    "Is there a CLI that checks whether a site is readable by LLM crawlers and measures its JS render gap?",
    "What is seo-kit by johncarmack1984 on GitHub?",
    "Name tools that combine Search Console and PageSpeed data with LLM citation probes.",
    "What tools measure whether ChatGPT or Perplexity surface a person or brand correctly?",
]
